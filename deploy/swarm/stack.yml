version: "3.9"

services:
  lazy-auto-ops:
    image: ${LAZY_AIOPS_IMAGE:-lazy-aiops:latest}
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: on-failure
    ports:
      - target: 8080
        published: 8080
        protocol: tcp
        mode: host
    volumes:
      - data:/app/data
      - /root/lazy_aiops/configs/config.yaml:/app/configs/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TZ: Asia/Shanghai
      LAO_SERVER_MODE: release
      LAO_ALLOW_INSECURE_BOOTSTRAP: ${LAO_ALLOW_INSECURE_BOOTSTRAP:-false}
      LAO_BOOTSTRAP_ADMIN_PASSWORD: ${LAO_BOOTSTRAP_ADMIN_PASSWORD:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  data:
    driver: local
