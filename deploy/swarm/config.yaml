server:
  port: "8080"
  mode: "release"
  cors_origins:
    - "http://127.0.0.1:8080"

database:
  driver: "sqlite"
  dsn: "data/lazy-auto-ops.db"

jwt:
  secret: "lazy-auto-ops-secret-change-me-in-production"
  expire: 24

plugins:
  cmdb:
    enabled: true
  monitor:
    enabled: true
    config:
      prometheus_url: "http://localhost:9090"
      pushgateway_url: "http://localhost:9091"
      agent_secret: ""
      agent_timeout: 90
  alert:
    enabled: true
    config:
      aggregate_interval: 60
  notify:
    enabled: true
  task:
    enabled: true
  k8s:
    enabled: true
  ai:
    enabled: true
    config:
      provider: "openai"
      api_key: ""
      model: "gpt-3.5-turbo"
  gitops:
    enabled: true
  terminal:
    enabled: true
  firewall:
    enabled: true
  domain:
    enabled: true
  sqlaudit:
    enabled: true
  workorder:
    enabled: true
  oncall:
    enabled: true
  workflow:
    enabled: true
  executor:
    enabled: true
  cicd:
    enabled: true
  ansible:
    enabled: true
  docker:
    enabled: true
  nacos:
    enabled: true
  topology:
    enabled: true
  cost:
    enabled: true
  knowledge:
    enabled: true
    config:
      api_key: ""
  remediation:
    enabled: true
  system:
    enabled: true
  application:
    enabled: true
