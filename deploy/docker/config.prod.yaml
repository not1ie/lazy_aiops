server:
  port: "8080"
  mode: "release"

database:
  driver: "mysql"
  dsn: "lazyops:${MYSQL_PASSWORD}@tcp(mysql:3306)/lazy_auto_ops?charset=utf8mb4&parseTime=True&loc=Local"

jwt:
  secret: "${JWT_SECRET}"
  expire: 24

plugins:
  # 资产管理
  cmdb:
    enabled: true

  # 监控
  monitor:
    enabled: true
    config:
      prometheus_url: "http://prometheus:9090"
      pushgateway_url: "http://pushgateway:9091"
      agent_secret: ""
      agent_timeout: 90

  # 告警中心
  alert:
    enabled: true
    config:
      aggregate_interval: 60

  # 通知中心
  notify:
    enabled: true
    config:
      # 钉钉配置
      dingtalk:
        webhook: ""
        secret: ""
      # 企业微信配置
      wecom:
        webhook: ""
      # 飞书配置
      feishu:
        webhook: ""
        secret: ""
      # 邮件配置
      email:
        smtp_host: ""
        smtp_port: 587
        username: ""
        password: ""
        from: ""

  # 任务调度
  task:
    enabled: true

  # K8s管理
  k8s:
    enabled: true

  # AI运维助手
  ai:
    enabled: true
    config:
      provider: "openai"  # openai 或 ollama
      api_key: ""  # OpenAI API Key
      model: "gpt-3.5-turbo"
      # ollama_url: "http://ollama:11434"

  # GitOps
  gitops:
    enabled: true

  # WebTerminal
  terminal:
    enabled: true
  
  # 堡垒机融合
  jump:
    enabled: true

  # 防火墙SNMP
  firewall:
    enabled: true

  # 域名/SSL监控
  domain:
    enabled: true

  # SQL审计
  sqlaudit:
    enabled: true

  # 运维工单
  workorder:
    enabled: true

  # 值班排班
  oncall:
    enabled: true

  # 运维编排
  workflow:
    enabled: true

  # 批量执行
  executor:
    enabled: true

  # CI/CD集成
  cicd:
    enabled: true

  # Ansible管理
  ansible:
    enabled: true

  # Docker管理
  docker:
    enabled: true

  # Nacos配置中心
  nacos:
    enabled: true

  # 服务拓扑
  topology:
    enabled: true

  # 成本分析
  cost:
    enabled: true

  # AI知识库
  knowledge:
    enabled: true
    config:
      api_key: ""

  # 故障自愈
  remediation:
    enabled: true

  # 系统管理
  system:
    enabled: true

  # 应用中心
  application:
    enabled: true
