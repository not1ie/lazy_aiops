version: '3.8'

services:
  lazy-auto-ops:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        - GOPROXY=https://goproxy.cn,direct
        - GO111MODULE=on
    container_name: lazy-auto-ops
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/configs/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock # 挂载 Docker Socket 以管理本机
    environment:
      - TZ=Asia/Shanghai
      - LAO_SERVER_MODE=release
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

