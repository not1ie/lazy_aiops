version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: lazy-auto-ops-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: lazy_auto_ops
      MYSQL_USER: lazyops
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - lazy-auto-ops-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: lazy-auto-ops-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - lazy-auto-ops-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  lazy-auto-ops:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: lazy-auto-ops
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./config.prod.yaml:/app/configs/config.yaml:ro
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
      - LAO_SERVER_MODE=release
      - LAO_JWT_SECRET=${JWT_SECRET}
      - LAO_ALLOW_INSECURE_BOOTSTRAP=${LAO_ALLOW_INSECURE_BOOTSTRAP:-false}
      - LAO_BOOTSTRAP_ADMIN_PASSWORD=${LAO_BOOTSTRAP_ADMIN_PASSWORD:-}
    networks:
      - lazy-auto-ops-net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: lazy-auto-ops-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - lazy-auto-ops-net
    depends_on:
      - lazy-auto-ops
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  lazy-auto-ops-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
