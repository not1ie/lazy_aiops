apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lazy-auto-ops
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
  - host: lazy-aiops.local
    http:
      paths:
      - path: /(.*)
        pathType: Prefix
        backend:
          service:
            name: lazy-auto-ops
            port:
              number: 80
