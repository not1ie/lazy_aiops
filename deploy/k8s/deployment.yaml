apiVersion: apps/v1
kind: Deployment
metadata:
  name: lazy-auto-ops
  labels:
    app: lazy-auto-ops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lazy-auto-ops
  template:
    metadata:
      labels:
        app: lazy-auto-ops
    spec:
      containers:
      - name: lazy-auto-ops
        image: lazy-aiops:latest
        ports:
        - containerPort: 8080
        env:
        - name: TZ
          value: "Asia/Shanghai"
        volumeMounts:
        - name: config
          mountPath: /app/configs/config.yaml
          subPath: config.yaml
        - name: data
          mountPath: /app/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: lazy-auto-ops-config
      - name: data
        persistentVolumeClaim:
          claimName: lazy-auto-ops-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: lazy-auto-ops
spec:
  selector:
    app: lazy-auto-ops
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lazy-auto-ops-config
data:
  config.yaml: |
    server:
      port: "8080"
      mode: "release"

    database:
      driver: "sqlite"
      dsn: "data/lazy-auto-ops.db"

    jwt:
      secret: "lazy-auto-ops-secret-change-me-in-production"
      expire: 24

    plugins:
      cmdb:
        enabled: true
      monitor:
        enabled: true
        config:
          prometheus_url: "http://prometheus:9090"
          pushgateway_url: "http://pushgateway:9091"
          agent_secret: ""
          agent_timeout: 90
      alert:
        enabled: true
        config:
          aggregate_interval: 60
      notify:
        enabled: true
      task:
        enabled: true
      k8s:
        enabled: true
      ai:
        enabled: true
        config:
          provider: "openai"
          api_key: ""
          model: "gpt-3.5-turbo"
      gitops:
        enabled: true
      terminal:
        enabled: true
      firewall:
        enabled: true
      domain:
        enabled: true
      sqlaudit:
        enabled: true
      workorder:
        enabled: true
      oncall:
        enabled: true
      workflow:
        enabled: true
      executor:
        enabled: true
      cicd:
        enabled: true
      ansible:
        enabled: true
      docker:
        enabled: true
      nacos:
        enabled: true
      topology:
        enabled: true
      cost:
        enabled: true
      knowledge:
        enabled: true
        config:
          api_key: ""
      remediation:
        enabled: true
      system:
        enabled: true
      application:
        enabled: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lazy-auto-ops-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
